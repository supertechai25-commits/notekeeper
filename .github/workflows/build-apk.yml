name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer Docker
        run: |
          docker run --rm \
            -v $(pwd):/home/user/notekeeper \
            -w /home/user/notekeeper \
            kivy/buildozer:stable \
            bash -c "touch main.py && buildozer android debug"
      - uses: actions/upload-artifact@v4
        with:
          name: NoteKeeper-apk
          path: bin/*.apk
