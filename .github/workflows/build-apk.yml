name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 25b
        run: |
          sdkmanager --install "ndk;25.2.9519653" || true

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libltdl-dev libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev build-essential

      - name: Install python-for-android
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install git+https://github.com/kivy/python-for-android.git@v2024.01.21

      - name: Create build recipe
        run: |
          export ANDROIDNDK=/usr/local/lib/android/sdk/ndk/25.2.9519653
          p4a create --arch arm64-v8a --android-api 34 --ndk-api 21 --requirements python3,kivy --dir . --name notekeeper --package org.local.notekeeper 2>&1

      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
