name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev build-essential
      - name: Install Buildozer
        run: pip install --upgrade buildozer cython==0.29.33
      - name: Build APK
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          # Accept SDK licenses multiple times to ensure acceptance
          for i in 1 2 3; do
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_HOME || true
            sleep 1
          done
          buildozer -v android debug || {
            rm -rf .buildozer
            buildozer -v android debug
          }
      - uses: actions/upload-artifact@v4
        with:
          name: NoteKeeper-apk
          path: bin/*.apk