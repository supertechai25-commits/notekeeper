name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libltdl-dev libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev build-essential
          
      - name: Install python-for-android
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install git+https://github.com/kivy/python-for-android.git@master
          
      - name: Create build recipe
        run: |
          p4a create --arch arm64-v8a --api 34 --android_api 34 --requirements python3,kivy --dir . --name notekeeper --package org.local.notekeeper
          
      - name: Find and upload APK
        run: |
          find . -name "*.apk" -type f
          ls -la *.apk 2>/dev/null || ls -la bin/*.apk 2>/dev/null || true
        if: always()
        
      - uses: actions/upload-artifact@v4
        with:
          name: NoteKeeper-apk
          path: bin/*.apk
          if-no-files-found: ignore
